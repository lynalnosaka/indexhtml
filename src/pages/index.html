<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend-Ajax System</title>
    <meta name="description" content="AJAX-based frontend system with instant page transitions and dynamic content loading">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Meta tags for SEO -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="Frontend-Ajax System">
    
    <!-- Open Graph tags -->
    <meta property="og:title" content="Frontend-Ajax System">
    <meta property="og:description" content="AJAX-based frontend system with instant page transitions">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    
    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Frontend-Ajax System">
    <meta name="twitter:description" content="AJAX-based frontend system with instant page transitions">
</head>
<body>
    <!-- Main content container -->
    <div id="content">
        <!-- Content will be loaded here via AJAX -->
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>Loading...</p>
        </div>
    </div>
    
    <!-- Loading overlay for page transitions -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>Loading page...</p>
        </div>
    </div>
    
    <!-- Error container for displaying errors -->
    <div id="error-container" class="error-container" style="display: none;">
        <div class="error-content">
            <h3>Error</h3>
            <p id="error-message"></p>
            <button onclick="location.reload()" class="btn btn-primary">Retry</button>
        </div>
    </div>
    
    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/history.js/1.8/bundled/html4+html5/jquery.history.js"></script>
    
    <!-- Load configuration first -->
    <script src="/config/spaces-config.js"></script>
    
    <!-- Load core system -->
    <script src="/core/error-handler.js"></script>
    <script src="/core/state-manager.js"></script>
    <script src="/core/navigation-manager.js"></script>
    
    <!-- Load utilities -->
    <script src="/utils/url-utils.js"></script>
    <script src="/utils/cache-manager.js"></script>
    
    <!-- Load components -->
    <script src="/components/site-creator.js"></script>
    
    <!-- Initialize the system -->
    <script>
        $(document).ready(function() {
            console.log('Frontend-Ajax System initializing...');
            
            try {
                // Initialize navigation
                if (typeof NavigationManager !== 'undefined') {
                    NavigationManager.init();
                    console.log('NavigationManager initialized');
                } else {
                    console.error('NavigationManager not found');
                }
                
                // Initialize state management
                if (typeof StateManager !== 'undefined') {
                    StateManager.init();
                    console.log('StateManager initialized');
                } else {
                    console.error('StateManager not found');
                }
                
                // Initialize error handling
                if (typeof ErrorHandler !== 'undefined') {
                    ErrorHandler.init();
                    console.log('ErrorHandler initialized');
                } else {
                    console.error('ErrorHandler not found');
                }
                
                // Initialize cache manager
                if (typeof CacheManager !== 'undefined') {
                    CacheManager.init();
                    console.log('CacheManager initialized');
                } else {
                    console.error('CacheManager not found');
                }
                
                // Load initial content from home template
                if (NavigationManager && NavigationManager.loadContent) {
                    NavigationManager.loadContent('/pages/home.html');
                    console.log('Initial content loaded');
                } else {
                    console.error('NavigationManager.loadContent not available');
                    // Fallback: load content directly
                    $('#content').load('/pages/home.html', function(response, status, xhr) {
                        if (status === 'error') {
                            console.error('Failed to load initial content:', xhr.status, xhr.statusText);
                            $('#error-container').show();
                            $('#error-message').text('Failed to load content. Please check your configuration.');
                        } else {
                            console.log('Content loaded successfully');
                        }
                    });
                }
                
                console.log('Frontend-Ajax System initialized successfully');
                
            } catch (error) {
                console.error('Error initializing Frontend-Ajax System:', error);
                $('#error-container').show();
                $('#error-message').text('System initialization failed: ' + error.message);
            }
        });
        
        // Global error handler
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
            if (typeof ErrorHandler !== 'undefined') {
                ErrorHandler.handleGlobalError(event.error);
            }
        });
        
        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled promise rejection:', event.reason);
            if (typeof ErrorHandler !== 'undefined') {
                ErrorHandler.handlePromiseRejection(event.reason);
            }
        });
    </script>
    
    <!-- Additional styles for loading states -->
    <style>
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            text-align: center;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
        }
        
        .error-content h3 {
            color: #e74c3c;
            margin-bottom: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        
        .btn-primary {
            background-color: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2980b9;
        }
    </style>
</body>
</html>
